name: Publish Plugin Registry

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build tarballs
        run: |
          mkdir -p dist
          for dir in plugins/*/; do
            plugin_id=$(basename "$dir")
            if [ -f "$dir/plugin.json" ]; then
              tar -czf "dist/${plugin_id}.tar.gz" -C plugins "$plugin_id"
              echo "Built: ${plugin_id}.tar.gz"
            fi
          done

      - name: Generate version tag
        id: tag
        run: echo "tag=v$(date +%Y.%m.%d.%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Plugin Registry ${{ steps.tag.outputs.tag }}
          files: dist/*.tar.gz

      - name: Build catalog.json
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}"
          node scripts/build-catalog.js --release-url "$RELEASE_URL"

      - name: Commit catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet || git commit -m "Update catalog.json [skip ci]"
          git push
